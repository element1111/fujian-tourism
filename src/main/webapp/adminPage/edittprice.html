<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!-- title Link -->
    <link rel="shortcut icon" type="image/png" href="assets/images/title.png">
    <link rel="stylesheet" href="assets/css/template-admin.css" />

</head>
<body>

<div class="page-wrapper" style="margin-top: 10px;">
    <div class="main-content">
        <div class="from-wrapper" id="app">
            <div class="row">

                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                    <div class="card">
                        <div class="card-header">
                            <h4>编辑特价</h4>
                            <!--<p class="card-desc">Here are examples of form add <code>.form</code>tag with inputs.</p>-->
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">





                                    <div class="form-group row">
                                        <label class="col-md-2 col-form-label">特价</label>
                                        <div class="col-md-10">
                                            <input class="form-control" type="text" v-model="tprice" placeholder="特价">
                                        </div>
                                    </div>



                                    <div class="form-group row mb-0">
                                        <div class="col-sm-10 offset-sm-2">
                                            <button class="btn btn-primary" type="button" @click="add()">提交</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <div class="ad-footer-btm">
            <p>Copyright {{ currentYear }} © </p>
        </div>
    </div>
</div>
<script src="assets/js/template-admin.js"></script>
<script type="text/javascript">


    var qs = Qs
    var id = UrlParam.paramValues("id").toString()
    var pageNum = UrlParam.paramValues("pageNum").toString()


    var vmm = new Vue({
        el: '#app',
        data: {
            currentYear: new Date().getFullYear(),
            id:id,
            tprice:"",
            price:"",
            pageNum:pageNum,
        },
        mounted(){
            this.show()
        },
        methods: {
            show(){
                axios.post('productShow',qs.stringify({
                    id:this.id,
                })).then(response =>{
                    this.price = response.data.painting.price
                    this.tprice = response.data.painting.tprice
                }).catch(error =>{
                    console.log(error)
                })
            },
            add() {

                if(this.tprice==""||!/^(0|[1-9][0-9]{0,9})(\.[0-9]{1,2})?$/.test(this.tprice)){
                    layer.msg("价格输入错误",{icon:5})
                    return false;
                }

                if(parseFloat(this.price)<=parseFloat(this.tprice)){
                    layer.msg("特价不能大于原价",{icon:5})
                    return false;
                }

                axios.post('tpriceEdit',qs.stringify({
                    id:this.id,
                    tprice:this.tprice,
                })).then(response =>{
                    location.replace("productlist.html?pageNum="+this.pageNum)
                }).catch(error =>{
                    console.log(error)
                })
            },



        }
    });

    $(document).ready(function () {
        $('#iframetop').load('top.html');

    });

</script>

</body>
</html>
