# 数据库连接配置
# 数据库URL：使用MySQL数据库，数据库名为25_hometown_tourism
# useUnicode=true：启用Unicode字符编码，支持中文
# characterEncoding=utf8：设置字符编码为UTF-8
# serverTimezone=Asia/Shanghai：设置时区为上海
# useSSL=false：禁用SSL连接
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/26_hometown_tourism?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
# 数据库用户名
spring.datasource.username=root
# 数据库密码
spring.datasource.password=123456
# 数据库驱动类名：使用MySQL 8.0的驱动类
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库连接池配置（优化连接稳定性，解决connection abort问题）
spring.datasource.initial-size=5
spring.datasource.max-active=20
spring.datasource.min-idle=5
spring.datasource.max-wait=10000
spring.datasource.test-on-borrow=true
spring.datasource.test-while-idle=true
spring.datasource.validation-query=SELECT 1
spring.datasource.time-between-eviction-runs-millis=60000
spring.datasource.min-evictable-idle-time-millis=300000

# 应用上下文路径配置
# 设置为根路径，访问时不需要额外的上下文路径
server.servlet.context-path=/

# 视图解析器配置
# 设置视图文件的后缀为.jsp
spring.mvc.view.suffix=.jsp

# PageHelper分页插件配置
# 指定数据库方言为MySQL
pagehelper.helperDialect=mysql
# 开启合理化，当pageNum<1时自动查询第一页，当pageNum>pages时自动查询最后一页
pagehelper.reasonable=true
# 支持通过Mapper接口参数来传递分页参数
pagehelper.supportMethodsArguments=true
# 配置参数映射，从Map中取值
pagehelper.params=count=countSql

# JSP开发模式配置
# 开启JSP开发模式，支持热部署
server.servlet.jsp.init-parameters.development=true

# 文件上传配置
# 单个文件大小限制为10MB
spring.servlet.multipart.max-file-size=10MB
# 单次请求总大小限制为100MB
spring.servlet.multipart.max-request-size=100MB

# 服务器配置
# 设置服务器端口为8088
server.port=8088
